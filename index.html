<!DOCTYPE html>
<html>
<head>
    <title>Form with Upload Profile</title>
<input type="hidden" name="access_key" value="d2bb2cf8-14db-4071-a8eb-fe78c33a4df7">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f4f4f4;
        }

        .container {
            margin-top: 50px;
        }

        /* Circular Image */
        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 20px;
            border: 5px solid #ff3b3b;
        }

        input, textarea {
            width: 260px;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #ff3b3b;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #e60000;
        }

        /* Popup */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            font-size: 20px;
            color: green;
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Profile Image Preview -->
    <img id="preview" src="https://via.placeholder.com/180" class="profile-img">

    <!-- Upload Image -->
    <input type="file" accept="image/*" onchange="loadImage(event)"><br>

    <h2>Enter Details</h2>

    <input type="text" id="name" placeholder="Enter your name"><br>
    <textarea id="message" placeholder="Enter your message"></textarea><br>

    <button onclick="submitForm()">Submit</button>

</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popup-content">
        ✅ Submitted Successfully!
    </div>
</div>

<script>
function loadImage(event) {
    const image = document.getElementById('preview');
    image.src = URL.createObjectURL(event.target.files[0]);
}

function submitForm() {
    let name = document.getElementById("name").value;
    let message = document.getElementById("message").value;

    if(name === "" || message === "") {
        alert("Please fill all fields!");
        return;
    }

    document.getElementById("popup").style.display = "flex";

    setTimeout(() => {
        document.getElementById("popup").style.display = "none";
    }, 2000);
}
</script>

</body>
</html>
